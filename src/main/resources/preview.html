<!DOCTYPE html>
<html>
<head>
    <script src="mermaid.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #ffffff;
        }

        .mermaid {
            display: flex;
            justify-content: center;
            align-items: center;
            min-width: 300px;
        }

        .mermaid svg {
            width: auto;
            height: auto;
            max-width: none !important;
            max-height: none;
        }

        #settings {
            display: flex;
            z-index: 100;
            left: 5px;
            bottom: 5px;
            position: fixed;
        }

        #zoom-value {
            width: 50px;
        }

    </style>
</head>
<body>
<div class="mermaid">
</div>
<pre id="source" style="display: none">
</pre>
<div id="settings">
    <button id="zoom-in">+</button>
    <button id="zoom-out">-</button>
    <input id="zoom-value" readonly value="100">
</div>
<script>
    mermaid.initialize({
        startOnLoad: false,
        theme: 'default'
    });
    const zoom_step = 20;
    let zoom = 100;
    let svgWidth = 0;
    let svgHeight = 0;

    document.querySelector('button#zoom-in').addEventListener('click', () => {
        zoom += zoom_step;
        size_change();
    });

    document.querySelector('button#zoom-out').addEventListener('click', () => {
        if (zoom < zoom_step) {
            return;
        }
        zoom -= zoom_step;
        size_change();
    });

    function size_change() {
        document.querySelector('.mermaid').style.width = svgWidth * zoom / 100 + "px";
        document.querySelector('.mermaid').style.height = svgHeight * zoom / 100 + "px";
        document.querySelector('#zoom-value').value = zoom + "%";
        mermaid_render();
    }

    function getSvgSize() {
        const numbers = document.querySelector('.mermaid svg')?.getAttribute('viewBox').split(' ').map(Number);
        svgWidth = numbers[2];
        svgHeight = numbers[3];
    }

    async function mermaid_render() {
        const mer = document.querySelector('.mermaid');
        const source = document.querySelector('#source');
        const {svg, bind} = await mermaid.render('myDiagram', source.innerText);
        mer.innerHTML = svg;
    }

    function fetchDiagram() {
        return fetch(window.location.href.replace(/\/preview/, '/diagram'))
            .then(response => response.json())
            .then(async json => {
                document.querySelector('#source').innerText = json.content;
                await mermaid_render();
                getSvgSize();
            });
    }

    function initialize() {
        fetchDiagram()
            .then(() => {
                let initialZoom = calcZoom(window.innerWidth - 40, svgWidth);
                const calcZoom1 = calcZoom(window.innerHeight - 40, svgHeight);
                if (initialZoom > calcZoom1) {
                    initialZoom = calcZoom1;
                }
                zoom = Math.floor(initialZoom);
            })
            .then(() => size_change());
    }

    function calcZoom(win, svg) {
        if (win > svg) {
            return 100;
        }
        return win / svg * 100;
    }

    initialize();
</script>
</body>
</html>
